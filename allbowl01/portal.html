<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国プロボウリング チャレンジマッチ情報 2026 | スケジュール検索</title>
    <meta name="description" content="2026年開催の全国プロボウラー・チャレンジマッチ情報を網羅。日付・会場・プロ名から簡単に検索・比較できる公式スケジュールまとめサイトです。">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e8002d;    /* メインの赤 */
            --bg: #ffffff;         /* 清潔感のある白 */
            --bg-alt: #f8f9fa;     /* 薄いグレー（縞模様用） */
            --text: #2d3436;       /* 読みやすい濃いグレー */
            --text-sub: #636e72;   /* 補足情報の薄いグレー */
            --border: #dfe6e9;     /* 境界線 */
            --gold: #b8860b;       /* チェーン名用 */
            --accent: #0984e3;     /* リンク等アクセント */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Noto Sans JP', sans-serif; 
            font-size: 15px; /* 読みやすさ重視のサイズアップ */
            line-height: 1.6;
        }

        /* ヘッダー周り */
        header { 
            padding: 20px 32px; 
            border-bottom: 2px solid var(--primary); 
            background: #fff;
        }
        h1.logo { 
            font-family: 'Bebas Neue', sans-serif; 
            font-size: 32px; 
            letter-spacing: 2px; 
            color: var(--primary); 
            margin-bottom: 4px;
        }
        h1.logo span { color: var(--text); }
        .header-sub { font-size: 12px; color: var(--text-sub); font-weight: bold; }
        .header-meta { font-size: 11px; color: var(--text-sub); margin-top: 8px; }

        /* 統計エリア */
        .stats { display: flex; flex-wrap: wrap; background: var(--bg-alt); border-bottom: 1px solid var(--border); }
        .sb { padding: 15px 24px; border-right: 1px solid var(--border); flex: 1; min-width: 120px; text-align: center; }
        .sn { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); line-height: 1; }
        .sl { font-size: 10px; color: var(--text-sub); margin-top: 4px; font-weight: bold; }

        /* コントロール（検索・フィルタ） */
        .controls { padding: 10px 20px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .cg { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px dashed var(--border); flex-wrap: wrap; }
        .cg:last-child { border-bottom: none; }
        .cl { font-size: 11px; font-weight: bold; color: var(--text-sub); width: 80px; flex-shrink: 0; }
        
        .chip { 
            background: #fff; border: 1px solid var(--border); color: var(--text); 
            padding: 5px 14px; font-size: 12px; cursor: pointer; border-radius: 20px;
            transition: all .2s;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.on { background: var(--primary); border-color: var(--primary); color: #fff; }

        input[type=text], select {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px;
        }

        /* テーブル表示 */
        #view-table { padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        thead th { 
            background: var(--bg-alt); text-align: left; padding: 12px; 
            font-size: 11px; color: var(--text-sub); border-bottom: 2px solid var(--border);
        }
        tbody tr { border-bottom: 1px solid var(--border); }
        tbody tr:nth-child(even) { background: var(--bg-alt); }
        tbody tr:hover { background: #fffde7; }
        td { padding: 14px 12px; }

        .td-date { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--primary); }
        .td-dow { font-size: 11px; color: var(--text-sub); margin-left: 4px; }
        .td-chain { font-size: 11px; color: var(--gold); font-weight: bold; }
        .td-store { font-weight: 700; color: var(--text); }
        .td-entry a { 
            display: inline-block; padding: 4px 12px; border: 1px solid var(--primary); 
            color: var(--primary); text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: bold;
        }
        .td-entry a:hover { background: var(--primary); color: #fff; }

        /* カード表示 */
        #view-card { padding: 20px; display: none; background: var(--bg-alt); }
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .card { 
            background: #fff; padding: 20px; border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary);
        }
        
        .no-result { text-align: center; padding: 100px; color: var(--text-sub); }
        footer { padding: 30px; text-align: center; font-size: 12px; color: var(--text-sub); background: var(--bg-alt); }

        @media (max-width: 600px) {
            header { padding: 15px; }
            .sb { padding: 10px; }
            .cl { width: 100%; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<header>
    <h1 class="logo">PRO<span>CHALLENGE</span></h1>
    <p class="header-sub">全国プロボウリングチャレンジマッチ開催スケジュール 2026</p>
    <div class="header-meta" id="lastUpdated">データ更新中...</div>
</header>

<main>
    <section class="stats" aria-label="開催統計情報">
        <div class="sb"><div class="sn" id="sn-count">—</div><div class="sl">総イベント数</div></div>
        <div class="sb"><div class="sn" id="sn-venues">—</div><div class="sl">開催会場数</div></div>
        <div class="sb"><div class="sn" id="sn-pros">—</div><div class="sl">参戦プロ数</div></div>
        <div class="sb"><div class="sn" id="sn-chains">—</div><div class="sl">チェーン店数</div></div>
    </section>

    <nav class="controls">
        <div class="cg">
            <span class="cl">表示切替</span>
            <button class="chip on" id="btn-table" onclick="setView('table')">リスト表示</button>
            <button class="chip" id="btn-card" onclick="setView('card')">カード表示</button>
        </div>
        <div class="cg" id="cg-chain">
        <span class="cl">チェーン</span>
        <button class="chip on" onclick="setFilterChain('', this)">ALL</button>
        </div>
        <div class="cg" id="cg-pref">
            <span class="cl">都道府県</span>
            <button class="chip on" onclick="setFilterPref('',this)">全国すべて</button>
        </div>
        <div class="cg">
            <span class="cl">プロ名検索</span>
            <input type="text" id="searchPro" placeholder="例：鈴木 太郎" oninput="onSearch()">
        </div>
    </nav>

    <article id="view-table">
        <table>
            <thead>
                <tr>
                    <th onclick="setSortKey('EventDate')">日付</th>
                    <th onclick="setSortKey('ChainName')">系列</th>
                    <th onclick="setSortKey('StoreName')">ボウリング場</th>
                    <th onclick="setSortKey('Prefecture')">地域</th>
                    <th onclick="setSortKey('ProNames')">出演プロボウラー</th>
                    <th>詳細</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
        <div class="no-result" id="no-t" style="display:none">条件に一致するイベントが見つかりませんでした。</div>
    </article>

    <article id="view-card">
        <div id="card-body"></div>
        <div class="no-result" id="no-c" style="display:none">データがありません。</div>
    </article>
</main>

<footer>
    &copy; 2026 全国プロチャレンジマッチ情報まとめ<br>
    出典: 各ボウリング場公式サイト
</footer>

<script>
/* JSロジックは元の機能を維持しつつ、UIの名称等のみ調整 */
// (ここに元のscriptの内容を貼り付ければ動作します。関数名等はそのままです)
// C# (WebView2) から呼び出される
// C#からデータを受け取るメイン関数
window.loadData = function(json, chains, prefs) {
    try {
        // C#から渡されるデータ(json)は、既にJSON形式のオブジェクトとして届く、
        // もしくは文字列ならパースする
        const data = (typeof json === 'string') ? JSON.parse(json) : json;
        const chainList = (typeof chains === 'string') ? JSON.parse(chains) : chains;
        const prefList = (typeof prefs === 'string') ? JSON.parse(prefs) : prefs;

        // 1. 統計情報の更新 (C#側のキー名: chain, store, pro に合わせる)
        document.getElementById('sn-count').innerText = data.length || 0;
        document.getElementById('sn-venues').innerText = new Set(data.map(d => d.store)).size;
        document.getElementById('sn-chains').innerText = chainList.length;
        
        // 出演プロ人数のユニーク集計
        let proSet = new Set();
        data.forEach(d => {
            if (d.pro) {
                d.pro.split(/[/／,、\s]+/).forEach(p => {
                    if(p.trim()) proSet.add(p.trim());
                });
            }
        });
        document.getElementById('sn-pros').innerText = proSet.size;

        // 2. テーブルの描画 (C#側の短いキー名を使用)
        renderTable(data);
        renderCards(data);  // ★ここを追加！カード形式も描画する命令です
        // 3. フィルタの生成
        generateFilterButtons('cg-chain', chainList, 'filterChain');
        generateFilterButtons('cg-pref', prefList, 'filterPref');
        
        // 4. 更新日時の表示
        const now = new Date();
        document.getElementById('lastUpdated').innerText = 
            `最終更新: ${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

    } catch (e) {
        console.error("JSON Parse Error:", e);
    }
};

// テーブルを描画する関数
function renderTable(data) {
    const tbody = document.getElementById('tbody');
    const noResult = document.getElementById('no-t');
    tbody.innerHTML = "";

    if (!data || data.length === 0) {
        noResult.style.display = "block";
        return;
    }
    noResult.style.display = "none";

    data.forEach(item => {
        // C#側のキー名: date, chain, store, pref, pro, url
        const dateStr = item.date ? item.date.replace(/-/g, '/') : '不明';
        
        const row = `
            <tr>
                <td class="td-date">${dateStr}</td>
                <td class="td-chain">${item.chain || '-'}</td>
                <td class="td-store">${item.store || '未設定'}</td>
                <td>${item.pref || '-'}</td>
                <td>${item.pro || '未定'}</td>
                <td class="td-entry"><a href="${item.url || '#'}" target="_blank">詳細</a></td>
            </tr>
        `;
        tbody.innerHTML += row;
    });
}
// --- カード形式の描画（今回追加） ---
function renderCards(data) {
    const cardBody = document.getElementById('card-body');
    cardBody.innerHTML = '<div class="cards"></div>'; // コンテナを作成
    const container = cardBody.querySelector('.cards');
    
    if (!data || data.length === 0) {
        document.getElementById('no-c').style.display = "block";
        return;
    }
    document.getElementById('no-c').style.display = "none";

    data.forEach(item => {
        const dateStr = item.date ? item.date.replace(/-/g, '/') : '不明';
        container.innerHTML += `
            <div class="card">
                <div class="td-date">${dateStr}</div>
                <div class="td-chain">${item.chain || ''}</div>
                <div class="td-store" style="font-size:1.2em; margin-bottom:8px;">${item.store}</div>
                <div style="color:var(--text-sub); font-size:0.9em; margin-bottom:12px;">
                    📍 ${item.pref} | 👤 ${item.pro}
                </div>
                <div class="td-entry">
                    <a href="${item.url || '#'}" target="_blank" style="display:block; text-align:center;">詳細を見る</a>
                </div>
            </div>`;
    });
}

// フィルタボタン（都道府県）を動的に生成する関数
function generateFilterButtons(containerId, list, messagePrefix) {
    const container = document.getElementById(containerId);
    // 「すべて」ボタン以外の古いボタンを削除
    const oldChips = container.querySelectorAll('.chip:not(:first-child)');
    oldChips.forEach(c => c.remove());

    list.forEach(text => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.innerText = text;
        btn.onclick = function() {
            // C#側の OnWebMessage に通知
            window.chrome.webview.postMessage(`${messagePrefix}:${text}`);
            container.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
            this.classList.add('on');
        };
        container.appendChild(btn);
    });
}

// 検索窓の入力イベント
function onSearch() {
    const val = document.getElementById('searchPro').value;
    window.chrome.webview.postMessage(`search:${val}`);
}

// ページ読み込み完了時にC#へ準備完了を伝える
window.addEventListener('DOMContentLoaded', () => {
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage("ready:1");
    }
});

// 表示切り替え
function setView(type) {
    document.getElementById('view-table').style.display = (type === 'table') ? 'block' : 'none';
    document.getElementById('view-card').style.display = (type === 'card') ? 'block' : 'none';
    document.getElementById('btn-table').classList.toggle('on', type === 'table');
    document.getElementById('btn-card').classList.toggle('on', type === 'card');
}
</script>
</body>
</html>
